services:
  - type: web
    name: fixate
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
