<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fixate — Email confirmed</title>
  <!--
    Static landing page for Supabase's email-change confirmation redirect.

    Supabase verifies the change-email token server-side, then redirects
    here with the new session in the URL fragment (#access_token=…&
    refresh_token=…&type=email_change). This page:

      1. Auto-attempts to open the app via the fixate:// deep link,
         preserving the original URL fragment so the app can pick up the
         session if it wants to.
      2. Offers a manual "Open Fixate" button as a fallback for browsers
         or email clients that block the auto-redirect to a custom scheme.

    Intentionally tiny: no framework, no external assets, light + dark
    mode via prefers-color-scheme, bilingual (EN + AR) for parity with
    the app.
  -->
  <style>
    :root { color-scheme: light dark; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "IBM Plex Sans Arabic", sans-serif;
    }
    body {
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0c0c0c; color: #f5f5f5; }
    }
    .card { max-width: 420px; width: 100%; }
    h1 { font-size: 22px; margin: 0 0 10px; }
    p { font-size: 15px; line-height: 1.55; margin: 0 0 8px; opacity: 0.82; }
    .btn {
      display: inline-block;
      margin-top: 22px;
      padding: 14px 28px;
      background: #10b981;
      color: #fff;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
    }
    .sep {
      height: 1px;
      background: currentColor;
      opacity: 0.12;
      margin: 28px 0;
    }
    .ar { direction: rtl; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ Email confirmed</h1>
    <p>Your email has been updated successfully. Return to the Fixate app to continue.</p>
    <a id="openApp" class="btn" href="#">Open Fixate</a>

    <div class="sep"></div>

    <div class="ar">
      <h1>✅ تم تأكيد الإيميل</h1>
      <p>تم تحديث الإيميل بنجاح. عُد إلى تطبيق Fixate للمتابعة.</p>
    </div>
  </div>

  <script>
    (function () {
      // Preserve the URL fragment Supabase appended (access_token,
      // refresh_token, type=email_change). The app's deep-link handler
      // can use it if/when one is added; today the app just observes
      // the auth state change on next session refresh.
      var deepLink = 'fixate:///auth/callback' + (window.location.hash || '');
      var btn = document.getElementById('openApp');
      btn.setAttribute('href', deepLink);
      // Auto-attempt the deep link after a short delay so the success
      // text is visible first. Browsers that block custom-scheme
      // navigation will silently no-op; the user can still tap the
      // button.
      setTimeout(function () { window.location.href = deepLink; }, 700);
    })();
  </script>
</body>
</html>
